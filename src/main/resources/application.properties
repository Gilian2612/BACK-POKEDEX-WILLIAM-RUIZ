# ===== APLICACIÓN =====
spring.application.name=wilddex-api
server.port=8080

# ===== POSTGRESQL (usuarios, colecciones, mercado, intercambios) =====
spring.datasource.url=jdbc:postgresql://localhost:5432/wilddex_db
spring.datasource.username=wilddex_user
spring.datasource.password=wilddex_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== FLYWAY (migraciones SQL) =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== POKÉAPI (consumo en vivo, sin persistencia local) =====
wilddex.pokeapi.base-url=https://pokeapi.co/api/v2

# ===== JWT =====
# Cambia este secreto por uno seguro antes de producción
wilddex.jwt.secret=wilddex-super-secret-key-change-this-in-production-2026
wilddex.jwt.expiration=86400000

# ===== SWAGGER / OPENAPI =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===== ACTUATOR (health check) =====
# Solo expone /actuator/health — el resto oculto por seguridad
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ===== LOGGING =====
logging.level.com.wilddex=DEBUG
logging.level.org.springframework.security=WARN
